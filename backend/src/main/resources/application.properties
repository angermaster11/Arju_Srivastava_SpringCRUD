spring.application.name=student-jdbc

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/schooldb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialize schema on startup (safe with IF NOT EXISTS)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Optional: show SQL init logs
logging.level.org.springframework.jdbc.datasource.init=INFO
